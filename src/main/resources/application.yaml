spring:
  application:
    name: sms

  datasource:
    url: jdbc:mysql://localhost:3306/s_m_s?createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show-sql: true
        format-sql: true
